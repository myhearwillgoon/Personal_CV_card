# GitHub Actions 工作流：部署到 GitHub Pages
name: Deploy to GitHub Pages

# 触发条件
on:
  # 推送到 main 分支时触发
  push:
    branches:
      - main
      - master
  
  # 手动触发
  workflow_dispatch:

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Create artifact
        run: |
          # 确保所有文件都在 site 目录中
          mkdir -p _site
          cp -r . _site/
          # 删除不需要的文件
          rm -rf _site/.git
          rm -rf _site/.github
          rm -rf _site/README.md
          rm -rf _site/_site
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
