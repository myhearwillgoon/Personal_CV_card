<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>程权 - AI Product Architect | 个人名片</title>
    <meta name="description" content="程权的个人名片网站 - AI Product Architect，展示AI项目作品">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 主内容区 -->
        <main class="main-card">
            <!-- 左侧：个人信息 -->
            <section class="profile-section">
                <div class="avatar-container">
                    <div class="avatar">
                        <span class="avatar-text">程权</span>
                    </div>
                    <div class="status-indicator" title="在线"></div>
                </div>
                
                <h1 class="name">程权</h1>
                <p class="title">AI Product Architect</p>
                <p class="location"><i class="fas fa-map-marker-alt"></i> London, UK</p>
                
                <div class="contact-info">
                    <a href="mailto:cheng_imperial_london@outlook.com" class="contact-link">
                        <i class="fas fa-envelope"></i>
                        <span>cheng_imperial_london@outlook.com</span>
                    </a>
                </div>
                
                <div class="social-links">
                    <a href="#" class="social-btn github" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="#" class="social-btn linkedin" title="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="#" class="social-btn wechat" title="微信" onclick="showWeChat(); return false;">
                        <i class="fab fa-weixin"></i>
                    </a>
                </div>
            </section>
            
            <!-- 中间：简历预览 -->
            <section class="resume-section">
                <h2><i class="fas fa-file-alt"></i> 简历预览</h2>
                <div class="resume-preview-container">
                    <iframe src="assets/resume.pdf" class="resume-iframe" title="简历预览"></iframe>
                </div>
                <a href="assets/resume.pdf" download class="download-btn">
                    <i class="fas fa-download"></i> 下载简历
                </a>
            </section>
            
            <!-- 右侧：作品集 -->
            <section class="portfolio-section">
                <h2><i class="fas fa-video"></i> 作品展示</h2>
                <div class="video-grid">
                    <div class="video-card" onclick="openVideo(0)">
                        <div class="video-thumbnail">
                            <img src="assets/videos/Openclaw_Open-notebook_demo_thumb.jpg" alt="Openclaw知识库演示">
                            <div class="play-overlay">
                                <i class="fas fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="video-info">
                            <h3>Openclaw+Open-notebook知识库</h3>
                            <p><i class="fas fa-clock"></i> 5:52</p>
                        </div>
                    </div>
                    
                    <div class="video-card" onclick="openVideo(1)">
                        <div class="video-thumbnail">
                            <img src="assets/videos/RAG_knowledge_base_thumb.jpg" alt="RAG知识库">
                            <div class="play-overlay">
                                <i class="fas fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="video-info">
                            <h3>RAG知识库系统</h3>
                            <p><i class="fas fa-clock"></i> 0:56</p>
                        </div>
                    </div>
                    
                    <div class="video-card" onclick="openVideo(2)">
                        <div class="video-thumbnail">
                            <img src="assets/videos/RAG_hallucination_elimination_thumb.jpg" alt="RAG排除幻觉">
                            <div class="play-overlay">
                                <i class="fas fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="video-info">
                            <h3>RAG知识库排除幻觉</h3>
                            <p><i class="fas fa-clock"></i> 1:11</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        
        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2026 程权. All rights reserved.</p>
        </footer>
    </div>
    
    <!-- 视频播放弹窗 -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <video id="video-player" controls>
                <source src="" type="video/mp4">
                您的浏览器不支持视频播放。
            </video>
            <h3 id="video-title"></h3>
        </div>
    </div>
    
    <!-- 微信弹窗 -->
    <div id="wechat-modal" class="modal">
        <div class="modal-content wechat-content">
            <span class="close-btn" onclick="closeWeChat()">&times;</span>
            <h3><i class="fab fa-weixin"></i> 微信联系</h3>
            <div class="wechat-info">
                <p>请发送邮件至：</p>
                <p class="email-highlight">cheng_imperial_london@outlook.com</p>
                <p>获取微信二维码</p>
            </div>
        </div>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
